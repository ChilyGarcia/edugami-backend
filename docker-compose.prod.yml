version: '3.9'

services:
  edugami-server:
    build:
      context: .
      dockerfile: dockerfile
    env_file:
      - .env
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MASTER_REGISTER_KEY=${MASTER_REGISTER_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo-edugami

  mongo-edugami:
    image: mongo:6
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=edugami
    volumes:
      - mongo-edugami-data-prod:/data/db

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - edugami-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/etc:/etc/letsencrypt
      - ./certbot/var:/var/lib/letsencrypt

volumes:
  mongo-edugami-data-prod:
