# Cualquier origen permitido: reflejar el Origin del request (si no hay Origin, usar *)
map $http_origin $cors_origin {
    default $http_origin;
    ""      "*";
}

server {
    listen 80;
    server_name api-edugami.aliviapp.com.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api-edugami.aliviapp.com.co;

    ssl_certificate     /etc/letsencrypt/live/api-edugami.aliviapp.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-edugami.aliviapp.com.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # CORS: permitir TODOS los orígenes (siempre en la respuesta)
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, Origin, X-Auth-Token" always;

    # Preflight OPTIONS: redirigir a location que SÍ aplica las cabeceras CORS (evita fallos de "if + return")
    if ($request_method = OPTIONS) {
        rewrite ^(.*)$ /__cors_preflight last;
    }

    location = /__cors_preflight {
        internal;
        add_header Access-Control-Allow-Origin $cors_origin;
        add_header Access-Control-Allow-Credentials "true";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Origin, X-Auth-Token";
        add_header Access-Control-Max-Age 86400;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    location / {
        proxy_pass         http://edugami-server:3005;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Origin $http_origin;

        proxy_connect_timeout 30s;
        proxy_send_timeout    90s;
        proxy_read_timeout   90s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @api_error;
    }

    location @api_error {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Origin, X-Auth-Token" always;
        default_type application/json; charset=utf-8;
        return 502 '{"error":"Gateway Error","message":"El servidor tardó en responder. Intenta de nuevo."}';
    }
}
