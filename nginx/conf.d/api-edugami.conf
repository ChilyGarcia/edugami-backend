server {
    listen 80;
    server_name api-edugami.aliviapp.com.co;

    # Redirección HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api-edugami.aliviapp.com.co;

    ssl_certificate     /etc/letsencrypt/live/api-edugami.aliviapp.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-edugami.aliviapp.com.co/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://edugami-server:3005;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

